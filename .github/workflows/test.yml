name: test

# Native build, vet, and test on the GitHub-hosted runners that work reliably
# for a pure-Go project: Linux and macOS, on both x86-64 and arm64. Windows and
# the other targets are covered by cross-build.yml, which cross-compiles them
# from a Linux runner with CGO_ENABLED=0 (zentools has no cgo).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # Linux x86-64
          - ubuntu-24.04-arm   # Linux arm64
          - macos-latest       # macOS arm64
          - macos-13           # macOS x86-64
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./... -count=1
