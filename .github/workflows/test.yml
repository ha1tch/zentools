name: test

# Native build, vet, and test. The first job runs on the GitHub-hosted runners
# (Linux, macOS, and Windows on x86-64, plus Linux and macOS on arm64). The
# second job runs inside Debian containers on the Linux runner, giving a
# non-Ubuntu Linux on both 64-bit and 32-bit. Targets with no native runner (the
# BSDs, 32-bit Raspberry Pi, 32-bit Windows) are cross-compiled in
# cross-build.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  runners:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # Linux x86-64
            race: '-race'
          - os: ubuntu-24.04-arm   # Linux arm64
            race: '-race'
          - os: macos-latest       # macOS arm64
            race: '-race'
          - os: macos-13           # macOS x86-64
            race: '-race'
          - os: windows-latest     # Windows x86-64
            race: '-race'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ${{ matrix.race }} -count=1 ./...

  debian:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Non-Ubuntu Linux x86-64. Go is preinstalled in the image, so
          # actions/setup-go is not used here.
          - name: debian/amd64 (Go 1.25)
            image: golang:1.25-bookworm
            race: '-race'
          # Non-Ubuntu Linux 32-bit. Runs natively because the amd64 host
          # executes i386 binaries directly. The race detector is not supported
          # on linux/386, so it is omitted here.
          - name: debian/i386 (Go 1.25)
            image: i386/golang:1.25-bookworm
            race: ''
    steps:
      - uses: actions/checkout@v4

      - name: Go version
        run: go version

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ${{ matrix.race }} -count=1 ./...
