name: cross-build

# Build verification, with cgo disabled, for every target the project ships to
# but does not test natively: macOS and Windows (built from Linux to avoid the
# scarce, slow macOS and Windows hosted runners), the 32-bit Linux target, the
# Raspberry Pi ARM variants, and the BSDs. zentools is pure Go with no cgo, so it
# cross-compiles cleanly. Running the tests on these targets requires real
# hardware or an emulator and is out of scope for CI; test.yml runs the tests
# natively on Linux.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  cross-build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - name: linux/amd64
            goos: linux
            goarch: amd64
          # Raspberry Pi
          - name: linux/arm (Pi Zero/1, ARMv6)
            goos: linux
            goarch: arm
            goarm: '6'
          - name: linux/arm (Pi 2/3, ARMv7)
            goos: linux
            goarch: arm
            goarm: '7'
          - name: linux/arm64 (Pi 3/4/5, 64-bit)
            goos: linux
            goarch: arm64

          # Linux 32-bit (x86)
          - name: linux/386
            goos: linux
            goarch: '386'

          # FreeBSD
          - name: freebsd/amd64
            goos: freebsd
            goarch: amd64
          - name: freebsd/arm64
            goos: freebsd
            goarch: arm64
          - name: freebsd/386
            goos: freebsd
            goarch: '386'

          # OpenBSD
          - name: openbsd/amd64
            goos: openbsd
            goarch: amd64
          - name: openbsd/arm64
            goos: openbsd
            goarch: arm64

          # NetBSD
          - name: netbsd/amd64
            goos: netbsd
            goarch: amd64
          - name: netbsd/arm64
            goos: netbsd
            goarch: arm64

          # DragonFly BSD
          - name: dragonfly/amd64
            goos: dragonfly
            goarch: amd64

          # Windows (amd64 and 32-bit). Cross-compiled from Linux with cgo
          # disabled, the same way the project's release binaries are built.
          - name: windows/amd64
            goos: windows
            goarch: amd64
          - name: windows/386
            goos: windows
            goarch: '386'

          # macOS (Intel and Apple Silicon). Cross-compiled from Linux to avoid
          # the scarce, slow macOS hosted runners.
          - name: darwin/amd64
            goos: darwin
            goarch: amd64
          - name: darwin/arm64
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build ./...
